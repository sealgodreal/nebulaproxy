<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050505; color: #fff;
  font-family: 'Geist', system-ui, sans-serif;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; text-align: center; overflow: hidden;
}
#bg { position: fixed; inset: 0; z-index: 0; opacity: 0.35; }
.content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
  padding: 40px 20px;
  animation: fadeUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.wordmark { font-size: 2.4rem; font-weight: 500; letter-spacing: -0.03em; color: #fff; line-height: 1; margin-bottom: 20px; }
.wordmark span { color: rgba(255,255,255,0.2); font-weight: 300; }
.icon-ring {
  width: 72px; height: 72px; border-radius: 50%;
  background: #0e0808; border: 1px solid #2a1010;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 24px; box-shadow: 0 0 40px rgba(180,40,40,0.08);
}
.error-code { font-size: 10px; font-weight: 400; letter-spacing: 0.14em; color: #6b2020; margin-bottom: 14px; text-transform: uppercase; }
.title { font-size: 1.4rem; font-weight: 500; letter-spacing: -0.025em; color: #fff; margin-bottom: 10px; }
.subtitle { font-size: 13px; font-weight: 300; color: #383838; letter-spacing: -0.01em; line-height: 1.65; max-width: fit-content; margin-bottom: 0px; }
.subtitle-the-second { font-size: 13px; font-weight: 300; color: #383838; letter-spacing: -0.01em; line-height: 1.65; max-width: fit-content; margin-bottom: 20px; }
.url-box {
  background: #0a0a0a; border: 1px solid #181818; border-radius: 12px;
  padding: 10px 20px; display: flex; align-items: center; gap: 8px;
  margin-bottom: 32px; min-width: 260px;
}
.url-lock { color: #6b2020; flex-shrink: 0; }
.url-text { font-size: 12px; color: #2e2e2e; letter-spacing: 0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.url-text .url-highlight { color: #444; }
.back-btn {
  background: #0e0e0e; border: 1px solid #1e1e1e; color: #444;
  font-size: 12px; font-family: 'Geist', sans-serif; font-weight: 400;
  padding: 10px 22px; border-radius: 10px; cursor: pointer;
  letter-spacing: 0.01em; transition: background 0.15s, border-color 0.15s, color 0.15s;
  text-decoration: none; display: inline-block;
}
.back-btn:hover { background: #161616; border-color: #2e2e2e; color: #aaa; }

.corner-gif { position: fixed; top: 10px; left: 10px; width: 60px; height: auto; z-index: 2; pointer-events: none; border-radius: 8px; }
</style>
</head>
<body>
<img class="corner-gif" src="https://raw.githubusercontent.com/sealgodreal/nebulabrowser/refs/heads/main/assets/CatEatingChips.gif" alt="">
<canvas id="bg"></canvas>
<div class="content">
  <div class="wordmark">nebula<span>.</span></div>
  <div class="icon-ring">
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
      <rect x="4" y="13" width="22" height="14" rx="3.5" stroke="#8b2020" stroke-width="1.4"/>
      <path d="M9.5 13V10a5.5 5.5 0 0 1 11 0v3" stroke="#8b2020" stroke-width="1.4" stroke-linecap="round"/>
      <circle cx="15" cy="19.5" r="1.8" fill="#8b2020"/>
      <line x1="15" y1="21.3" x2="15" y2="23.5" stroke="#8b2020" stroke-width="1.4" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="error-code">proxy block</div>
  <div class="title">That search has been blocked by the proxy.</div>

  <div class="subtitle">Reason: Blocked Link/Keyword</div>
  <div class="subtitle-the-second">Explanation: We suspect that the link opened contains media that can get Nebula Proxy shut down, therefore it has been blocked.</div>

  <div class="url-box">
    <svg class="url-lock" width="13" height="13" viewBox="0 0 13 13" fill="none">
      <rect x="1.5" y="5.5" width="10" height="6.5" rx="1.5" stroke="#8b2020" stroke-width="1.2"/>
      <path d="M4 5.5V4a2.5 2.5 0 0 1 5 0v1.5" stroke="#8b2020" stroke-width="1.2" stroke-linecap="round"/>
    </svg>
    <div class="url-text">
      <span class="url-highlight" id="blocked-url">no link</span>
    </div>
  </div>
  <a class="back-btn" href="https://onlinehomeworkhelper.onrender.com/lessons/math?url=https://sealgodreal.github.io/nebulabrowser/assets/homepage.html">Return Home</a>
</div>
<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  const link = params.get('link');
  if (link) {
    document.getElementById('blocked-url').textContent = link;
  }
})();

  const sped = 5;

  const canvas = document.getElementById("bg");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });

  const SHADES = [
    "rgba(255,255,255,",
    "rgba(235,235,235,",
    "rgba(210,210,210,",
    "rgba(185,185,185,",
    "rgba(160,160,160,",
    "rgba(220,220,220,",
  ];

  function spawnParticle() {
    const w = canvas.width, h = canvas.height;
    const edge = Math.random();
    let x, y, vx, vy;
    const baseSpeed = 0.35 + Math.random() * 0.55;
    const speed = baseSpeed * sped;

    if (edge < 0.45) {
      x = Math.random() * w * 0.65;
      y = h * (0.92 + Math.random() * 0.08);
      const angle = -(Math.PI * 0.18 + Math.random() * Math.PI * 0.28);
      vx = speed * Math.cos(angle) * (0.6 + Math.random() * 0.6);
      vy = speed * Math.sin(angle) * (0.8 + Math.random() * 0.5);
    } else if (edge < 0.85) {
      x = w * (Math.random() * 0.05);
      y = h * (0.35 + Math.random() * 0.65);
      const angle = -(Math.PI * 0.08 + Math.random() * Math.PI * 0.3);
      vx = speed * (0.7 + Math.random() * 0.5);
      vy = -speed * (0.3 + Math.random() * 0.5);
    } else {
      x = w * (Math.random() * 0.1);
      y = h * (0.85 + Math.random() * 0.15);
      const angle = -(Math.PI * 0.22 + Math.random() * Math.PI * 0.22);
      vx = speed * Math.cos(angle) * (0.6 + Math.random() * 0.7);
      vy = speed * Math.sin(angle) * (0.7 + Math.random() * 0.5);
    }

    return {
      x, y, vx, vy,
      size: 0.8 + Math.random() * 2.2,
      shade: SHADES[Math.floor(Math.random() * SHADES.length)],
      alpha: 0.25 + Math.random() * 0.5,
      frame: 0,
      wobbleAmp: 0.2 + Math.random() * 0.9,
      wobbleFreq: 0.015 + Math.random() * 0.025,
      wobbleOffset: Math.random() * Math.PI * 2,
      curve: (Math.random() - 0.35) * 0.006,
    };
  }

  function stepParticle(p) {
    p.vx += p.curve;
    p.x += p.vx + Math.sin(p.frame * p.wobbleFreq + p.wobbleOffset) * p.wobbleAmp;
    p.y += p.vy;
    p.frame++;
  }

  function isOffscreen(p) {
    return p.x > canvas.width + 20 || p.y < -20 || p.x < -20 || p.y > canvas.height + 20;
  }

  function drawParticle(p) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.shade + p.alpha.toFixed(3) + ")";
    ctx.fill();
  }

  function seedParticles(count) {
    const w = canvas.width, h = canvas.height;
    const cols = Math.ceil(Math.sqrt(count * (w / h)));
    const rows = Math.ceil(count / cols);
    const cellW = w / cols;
    const cellH = h / rows;
    const result = [];

    for (let row = 0; row < rows && result.length < count; row++) {
      for (let col = 0; col < cols && result.length < count; col++) {
        const targetX = col * cellW + Math.random() * cellW;
        const targetY = row * cellH + Math.random() * cellH;

        let best = null;
        let bestDist = Infinity;
        for (let attempt = 0; attempt < 30; attempt++) {
          const p = spawnParticle();
          const preFrames = Math.floor(10 + Math.random() * 500);
          for (let f = 0; f < preFrames; f++) stepParticle(p);
          if (isOffscreen(p)) continue;
          const dist = Math.hypot(p.x - targetX, p.y - targetY);
          if (dist < bestDist) {
            bestDist = dist;
            best = p;
          }
          if (dist < Math.max(cellW, cellH) * 0.5) break;
        }
        result.push(best || spawnParticle());
      }
    }
    return result;
  }

  const PARTICLE_COUNT = 55;
  const particles = seedParticles(PARTICLE_COUNT);

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let i = 0; i < particles.length; i++) {
      if (isOffscreen(particles[i])) particles[i] = spawnParticle();
      stepParticle(particles[i]);
      drawParticle(particles[i]);
    }
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
</script>
</body>
</html>
